server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/craftpg
    username: craftpg
    password: craftpg
  mail:
    host: ${APP_MAIL_HOST:localhost}
    port: ${APP_MAIL_PORT:1025}
    username: ${APP_MAIL_USER:}
    password: ${APP_MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: ${APP_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${APP_MAIL_SMTP_STARTTLS:false}
  jpa:
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelogs/db.changelog-master.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/craftpg

app:
  invite:
    base-url: ${APP_INVITE_BASE_URL:http://localhost:3000/invites}
    mail-from: ${APP_INVITE_MAIL_FROM:noreply@craftpg.local}
  minio:
    endpoint: http://localhost:9000
    region: us-east-1
    bucket-maps: campaign-maps
    bucket-portraits: character-portraits
